version: '3.8'

services:
  website:
    build: .
    container_name: jawk-certificados
    ports:
      - "8080:80"
    environment:
      - PORT=80
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - CONTACT_RECEIVER=${CONTACT_RECEIVER}
    restart: always
